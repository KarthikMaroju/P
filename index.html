<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Karthik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .mountain {
            position: absolute;
            bottom: 0;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.6));
        }
        
        .tree {
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
        }
        
        .house-window {
            animation: glow 3s infinite alternate ease-in-out;
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 8px #fef08c; }
            100% { box-shadow: 0 0 25px #fef08c; }
        }
        
        .snow {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: snowfall 15s linear infinite;
            opacity: 0.9;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#2a1b4a] via-[#4c1d95] to-[#9f1239] overflow-hidden relative flex items-center justify-center">
    
    <!-- Background Illustration Layer -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        
        <!-- Distant Mountains -->
        <div class="mountain w-full h-[65%] bottom-0 left-0" style="background: linear-gradient(to right, #1e2937 10%, #334155 40%, #1e2937 70%); clip-path: polygon(0% 100%, 25% 35%, 45% 75%, 65% 28%, 82% 68%, 100% 100%);"></div>
        
        <!-- Mid Mountains -->
        <div class="mountain w-full h-[58%] bottom-0 left-0" style="background: linear-gradient(to right, #334155 20%, #475569 50%, #334155 80%); clip-path: polygon(0% 100%, 18% 45%, 38% 82%, 55% 22%, 78% 65%, 100% 100%); opacity: 0.85;"></div>
        
        <!-- Foreground Mountains with Snow -->
        <div class="mountain w-full h-[52%] bottom-0 left-0" style="background: linear-gradient(to right, #475569, #64748b, #475569); clip-path: polygon(0% 100%, 12% 55%, 32% 88%, 48% 38%, 70% 72%, 100% 100%);"></div>
        
        <!-- Snow caps -->
        <div class="absolute bottom-[38%] left-[28%] w-0 h-0 border-l-[85px] border-l-transparent border-r-[85px] border-r-transparent border-b-[75px] border-b-white/90 z-10" style="filter: blur(2px);"></div>
        <div class="absolute bottom-[42%] left-[52%] w-0 h-0 border-l-[65px] border-l-transparent border-r-[65px] border-r-transparent border-b-[55px] border-b-white/90 z-10" style="filter: blur(1px);"></div>
        
        <!-- Pine Trees (Left Side) -->
        <!-- Tree 1 -->
        <div class="tree absolute bottom-12 left-8 w-28 z-20">
            <div class="relative">
                <!-- trunk -->
                <div class="w-4 h-28 bg-[#1e3a2f] mx-auto rounded-sm"></div>
                <!-- layers -->
                <div class="absolute -top-6 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[42px] border-l-transparent border-r-[42px] border-r-transparent border-b-[52px] border-b-[#14532d]"></div>
                <div class="absolute -top-16 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[34px] border-l-transparent border-r-[34px] border-r-transparent border-b-[42px] border-b-[#166534]"></div>
                <div class="absolute -top-24 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[26px] border-l-transparent border-r-[26px] border-r-transparent border-b-[34px] border-b-[#4ade80]"></div>
                <!-- snow -->
                <div class="absolute -top-28 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[18px] border-l-transparent border-r-[18px] border-r-transparent border-b-[18px] border-b-white"></div>
            </div>
        </div>
        
        <!-- Tree 2 -->
        <div class="tree absolute bottom-16 left-36 w-20 z-20">
            <div class="relative">
                <div class="w-3 h-20 bg-[#1e3a2f] mx-auto rounded-sm"></div>
                <div class="absolute -top-4 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[30px] border-l-transparent border-r-[30px] border-r-transparent border-b-[38px] border-b-[#14532d]"></div>
                <div class="absolute -top-12 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[24px] border-l-transparent border-r-[24px] border-r-transparent border-b-[30px] border-b-[#166534]"></div>
                <div class="absolute -top-19 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[16px] border-l-transparent border-r-[16px] border-r-transparent border-b-[22px] border-b-white"></div>
            </div>
        </div>
        
        <!-- Tree 3 -->
        <div class="tree absolute bottom-8 left-[22%] w-24 z-20">
            <div class="relative">
                <div class="w-4 h-24 bg-[#1e3a2f] mx-auto rounded-sm"></div>
                <div class="absolute -top-8 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[38px] border-l-transparent border-r-[38px] border-r-transparent border-b-[48px] border-b-[#14532d]"></div>
                <div class="absolute -top-18 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[32px] border-l-transparent border-r-[32px] border-r-transparent border-b-[40px] border-b-[#166534]"></div>
                <div class="absolute -top-27 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[22px] border-l-transparent border-r-[22px] border-r-transparent border-b-[28px] border-b-[#4ade80]"></div>
            </div>
        </div>
        
        <!-- Small House on Right -->
        <div class="absolute bottom-14 right-24 z-30">
            <!-- Main house -->
            <div class="w-44 h-40 bg-[#1e2937] relative rounded-tl-2xl" style="box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);">
                <!-- Roof -->
                <div class="absolute -top-14 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[92px] border-l-transparent border-r-[92px] border-r-transparent border-b-[68px] border-b-[#334155]"></div>
                
                <!-- Chimney -->
                <div class="absolute -top-20 right-12 w-8 h-14 bg-[#1e2937]">
                    <div class="w-12 h-6 bg-[#334155] -ml-2"></div>
                </div>
                
                <!-- Smoke -->
                <div class="absolute -top-40 right-10 w-6 h-6 bg-white/70 rounded-full blur-sm animate-[bounce_4s_infinite]"></div>
                <div class="absolute -top-48 right-6 w-4 h-4 bg-white/60 rounded-full blur-sm animate-[bounce_4.5s_infinite_0.6s]"></div>
                
                <!-- Door -->
                <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-14 h-24 bg-[#0f172a] border-r-4 border-[#1e2937]"></div>
                
                <!-- Windows -->
                <div class="house-window absolute bottom-12 left-8 w-10 h-10 bg-[#fef08c] shadow-[0_0_20px_#fef08c]"></div>
                <div class="house-window absolute bottom-12 right-8 w-10 h-10 bg-[#fef08c] shadow-[0_0_20px_#fef08c]"></div>
                
                <!-- Window glow lines -->
                <div class="absolute bottom-16 left-10 w-1 h-6 bg-[#1e2937]"></div>
                <div class="absolute bottom-16 right-10 w-1 h-6 bg-[#1e2937]"></div>
            </div>
        </div>
        
        <!-- Snow particles -->
        <div id="snow-container" class="absolute inset-0 z-10 pointer-events-none"></div>
        
    </div>
    
    <!-- Login Card -->
    <div class="relative z-40 w-full max-w-[380px] mx-4">
        <div class="glass border border-white/30 rounded-3xl p-10 shadow-2xl">
            
            <!-- Logo / Title -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-white/10 backdrop-blur-md rounded-2xl mb-4">
                    <i class="fa-solid fa-snowflake text-3xl text-white"></i>
                </div>
                <h1 class="text-white text-4xl font-semibold tracking-tighter">Login</h1>
            </div>
            
            <form class="space-y-7">
                <!-- Email -->
                <div>
                    <label class="block text-white/70 text-sm font-medium mb-2 pl-1">Email</label>
                    <input type="email" 
                           class="w-full bg-white/10 border border-white/30 focus:border-yellow-300 rounded-2xl px-6 py-4 text-white placeholder:text-white/50 outline-none transition-all text-base"
                           placeholder="karthik.dev@example.com">
                </div>
                
                <!-- Password -->
                <div>
                    <label class="block text-white/70 text-sm font-medium mb-2 pl-1">Password</label>
                    <input type="password" 
                           class="w-full bg-white/10 border border-white/30 focus:border-yellow-300 rounded-2xl px-6 py-4 text-white placeholder:text-white/50 outline-none transition-all text-base"
                           placeholder="••••••••">
                </div>
                
                <!-- Options -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 cursor-pointer text-white/70 hover:text-white transition">
                        <input type="checkbox" class="w-4 h-4 accent-yellow-400 bg-white/10 border-white/30 rounded">
                        <span>Remember Me</span>
                    </label>
                    <a href="#" onclick="alert('Forgot password flow would go here'); return false;" 
                       class="text-white/70 hover:text-white underline decoration-dotted">Forgot Password</a>
                </div>
                
                <!-- Login Button -->
                <button onclick="handleLogin(event)" 
                        class="w-full bg-white hover:bg-yellow-300 active:scale-[0.985] transition-all text-black font-semibold text-lg py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-black/40">
                    <span>Log in</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
            
            <!-- Register -->
            <div class="text-center mt-9 text-white/60 text-sm">
                Don't have an account? 
                <a href="#" onclick="alert('Register page would open here'); return false;" 
                   class="text-white hover:underline font-medium">Register</a>
            </div>
        </div>
        
        <!-- Subtle footer hint -->
        <div class="text-center mt-8 text-white/30 text-xs tracking-widest">
            SECURE • ENCRYPTED
        </div>
    </div>
    
    <script>
        // Tailwind script already loaded
        function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.closest('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
            `;
            
            setTimeout(() => {
                alert("✅ Login successful! (Demo)\n\nWelcome back, Karthik 👋");
                // In real project you would redirect to index.html
                window.location.href = "index.html";
            }, 1400);
        }
        
        // Snowfall effect
        function createSnow() {
            const container = document.getElementById('snow-container');
            for (let i = 0; i < 80; i++) {
                const snow = document.createElement('div');
                snow.className = 'snow';
                
                const size = Math.random() * 5 + 2;
                snow.style.width = `${size}px`;
                snow.style.height = `${size}px`;
                snow.style.left = `${Math.random() * 100}vw`;
                snow.style.top = `-${Math.random() * 50}px`;
                snow.style.opacity = Math.random() * 0.7 + 0.3;
                snow.style.animationDuration = `${Math.random() * 12 + 12}s`;
                snow.style.animationDelay = `-${Math.random() * 15}s`;
                
                container.appendChild(snow);
                
                // Remove after animation ends to keep performance
                setTimeout(() => {
                    if (snow.parentNode) snow.parentNode.removeChild(snow);
                }, 30000);
            }
        }
        
        // Initialize snow
        window.onload = () => {
            createSnow();
            // Restart snow every 25 seconds
            setInterval(() => {
                document.getElementById('snow-container').innerHTML = '';
                createSnow();
            }, 25000);
        };
    </script>
</body>
  </html>
